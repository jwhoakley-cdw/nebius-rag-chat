name: Deploy to Azure Private ACI

on:
#  push:
#    branches:
#      - main
  workflow_dispatch:

env:
  REGISTRY_LOGIN_SERVER: ${{ secrets.REGISTRY_LOGIN_SERVER }}
  IMAGE_NAME: nebius-rag-chat
  CONTAINER_NAME: nebius-rag-chat-private-container

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZJWHO_CDW_AI_SP }}

      - name: Deploy to Azure Container Instances
        uses: azure/CLI@v1
        with:
          azcliversion: latest
          inlineScript: |
            az container create \
              --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
              --name ${{ env.CONTAINER_NAME }} \
              --image ${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest \
              --registry-login-server ${{ env.REGISTRY_LOGIN_SERVER }} \
              --registry-username ${{ secrets.REGISTRY_USERNAME }} \
              --registry-password ${{ secrets.REGISTRY_PASSWORD }} \
              --os-type linux \
              --subnet ${{ vars.ACI_SUBNET_ID }} \
              --ports 8501 \
              --memory 1 \
              --cpu 1 \
              --assign-identity \
              --environment-variables LOG_LEVEL=INFO \
              --secure-environment-variables NEBIUS_API_KEY=${{ secrets.NEBIUS_API_KEY }} TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }} \
              --restart-policy OnFailure

      - name: Get Container Details
        uses: azure/CLI@v1
        with:
          azcliversion: latest
          inlineScript: |
            az container show \
              --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
              --name ${{ env.CONTAINER_NAME }}

      - name: Get ACI private IP
        uses: azure/CLI@v1
        with:
          azcliversion: latest
          inlineScript: |
            az container show \
              --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
              --name ${{ env.CONTAINER_NAME }} \
              --query ipAddress.ip \
              -o tsv