name: Remove Azure Private ACI

on:
  workflow_dispatch:

env:
  CONTAINER_NAME: nebius-rag-chat-private-container

jobs:
  remove:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Remove Azure Container Instance
        uses: azure/CLI@v1
        with:
          azcliversion: latest
          inlineScript: |
            echo "Attempting to delete container: ${{ env.CONTAINER_NAME }}"
            az container delete \
              --resource-group ${{ vars.RESOURCE_GROUP }} \
              --name ${{ env.CONTAINER_NAME }} \
              --yes
            echo "Container deletion completed"

      - name: Verify Container is Removed
        uses: azure/CLI@v1
        with:
          azcliversion: latest
          inlineScript: |
            echo "Verifying container removal..."
            if az container show \
              --resource-group ${{ vars.RESOURCE_GROUP }} \
              --name ${{ env.CONTAINER_NAME }} 2>/dev/null; then
              echo "Container still exists - deletion may have failed"
              exit 1
            else
              echo "Container successfully removed"
            fi
