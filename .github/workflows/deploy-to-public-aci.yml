name: Deploy to Azure Public ACI

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY_LOGIN_SERVER: ${{ secrets.REGISTRY_LOGIN_SERVER }}
  IMAGE_NAME: nebius-rag-chat
  CONTAINER_NAME: nebius-rag-chat-public-container
  RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate DNS Name Label
        id: dns
        run: |
          RANDOM_NUM=$((RANDOM % 100))
          DNS_NAME_LABEL="nebius-rag-chat-${RANDOM_NUM}"
          echo "dns_name_label=${DNS_NAME_LABEL}" >> $GITHUB_OUTPUT
          echo "Generated DNS Name Label: ${DNS_NAME_LABEL}"

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Instances
        uses: azure/CLI@v1
        with:
          azcliversion: latest
          inlineScript: |
            az container create \
              --resource-group ${{ vars.RESOURCE_GROUP }} \
              --name ${{ env.CONTAINER_NAME }} \
              --image ${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest \
              --registry-login-server ${{ env.REGISTRY_LOGIN_SERVER }} \
              --registry-username ${{ secrets.REGISTRY_USERNAME }} \
              --registry-password ${{ secrets.REGISTRY_PASSWORD }} \
              --os-type linux \
              --ip-address Public \
              --dns-name-label ${{ steps.dns.outputs.dns_name_label }} \
              --ports 8501 \
              --memory 1 \
              --cpu 1 \
              --environment-variables LOG_LEVEL=INFO \
              --restart-policy OnFailure

      - name: Get Container Details
        uses: azure/CLI@v1
        with:
          azcliversion: latest
          inlineScript: |
            az container show \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --name ${{ env.CONTAINER_NAME }}

      - name: Get ACI private IP
        uses: azure/CLI@v1
        with:
          azcliversion: latest
          inlineScript: |
            az container show \
              --resource-group ${{ vars.RESOURCE_GROUP }} \
              --name ${{ env.CONTAINER_NAME }} \
              --query ipAddress.ip \
              -o tsv

      - name: Get FQDN and DNS Name
        uses: azure/CLI@v1
        with:
          azcliversion: latest
          inlineScript: |
            echo "=== Container FQDN and DNS Details ==="
            FQDN=$(az container show \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --name ${{ env.CONTAINER_NAME }} \
              --query ipAddress.fqdn \
              -o tsv)
            DNS_LABEL=$(az container show \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --name ${{ env.CONTAINER_NAME }} \
              --query ipAddress.dnsNameLabel \
              -o tsv)
            echo "FQDN: $FQDN"
            echo "DNS Name Label: $DNS_LABEL"
            echo "Access URL: http://$FQDN:8501"

